<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True North Tiny Homes | Canada's #1 Tiny Home Resource</title>
    <meta name="description" content="Discover affordable tiny homes in Canada from $2,995. Compare designs, financing options, and off-grid solutions. Ships nationwide." />
    <meta name="keywords" content="tiny homes Canada, tiny house, bunkie kit, prefab homes, off-grid living, solar power, composting toilet" />
    <meta name="author" content="True North Tiny Homes" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="True North Tiny Homes | Canada's #1 Tiny Home Resource" />
    <meta property="og:description" content="Discover affordable tiny homes in Canada from $2,995. Compare designs, financing options, and off-grid solutions." />
    <meta property="og:image" content="/hero-tiny-home.jpg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
    
    <!-- Google Analytics 4 - REPLACE G-XXXXXXXXXX WITH YOUR TRACKING ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%');
      
      // Custom events for affiliate tracking
      gtag('event', 'page_view', {
        'page_title': document.title,
        'page_location': window.location.href,
        'page_path': window.location.pathname
      });
    </script>
    
    <!-- Affiliate Link Click Tracking -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Track all external link clicks
        document.addEventListener('click', function(e) {
          const link = e.target && e.target.closest ? e.target.closest('a[href]') : null;
          if (!link) return;

          const href = link.getAttribute('href') || '';
          if (!href.startsWith('http')) return;

          const isAmazon = href.includes('amazon');
          const isAffiliate = href.includes('tag=') || href.includes('ref=');

          if (typeof gtag !== 'function') return;

          const willNavigateSameTab = !link.hasAttribute('target') || link.getAttribute('target') === '_self';
          if (willNavigateSameTab) {
            e.preventDefault();
          }

          let navigated = false;
          const navigate = function() {
            if (navigated) return;
            navigated = true;
            if (willNavigateSameTab) {
              window.location.href = href;
            }
          };

          gtag('event', 'affiliate_click', {
            'event_category': 'Affiliate',
            'event_label': href,
            'value': isAmazon ? 1 : 0,
            'affiliate': isAffiliate ? 1 : 0,
            'transport_type': 'beacon',
            'event_callback': navigate
          });

          if (willNavigateSameTab) {
            setTimeout(navigate, 250);
          }
        }, true);

        // Track application form submissions
        document.addEventListener('submit', function(e) {
          const form = e.target;
          if (!(form instanceof HTMLFormElement)) return;

          if (typeof gtag !== 'function') return;

          gtag('event', 'form_submit', {
            'event_category': 'Lead',
            'event_label': 'Credit Application',
            'transport_type': 'beacon'
          });
        }, true);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
